name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify required project files
        run: |
          test -f index.html
          test -f app.js
          test -f taskLogic.js
          test -f taskLogic.test.js
          test -f playwright.config.js
          test -f tests/smoke.spec.js
          test -f styles.css
          test -f README.md
          test -f package.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Basic content checks
        run: |
          grep -q "TODO MVP" index.html
          grep -q "localStorage" app.js
          grep -q "Локальный запуск" README.md

      - name: Run tests
        run: npm run test:all
